<!DOCTYPE html>
<html>
<head>
    <title>HDI Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Human Development Index (HDI) Prediction</h1>

        <form action="/predict" method="POST">

            <label>Life Expectancy Index</label><br>
            <input type="number" step="0.01" name="life" placeholder="Enter value between 0 and 1" required><br><br>

            <label>Education Index</label><br>
            <input type="number" step="0.01" name="education" placeholder="Enter value between 0 and 1" required><br><br>

            <label>Income Index</label><br>
            <input type="number" step="0.01" name="income" placeholder="Enter value between 0 and 1" required><br><br>

            <button type="submit">Calculate HDI</button>

        </form>
    </div>

</body>
</html>
